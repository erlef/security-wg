    projects: []
    text: |-
      As a company building production systems on Elixir and Erlang, supply-chain security and trusted builds are not optional, they are foundational. Our platform relies on a deep stack of dependencies across Hex packages, Nerves-based firmware, and underlying Erlang/OTP components. Any compromise in that chain becomes a direct risk to our customers.

      We operate in environments where reliability and security are expected, not marketed. A single upstream vulnerability in a widely used package, build pipeline, or dependency could propagate quickly and undermine otherwise well-designed systems. That risk is amplified in IoT and edge deployments, where devices may run for long periods and are harder to patch at scale.

      Trusted builds are especially critical. We need confidence that what we build, test, and ship is exactly what runs in production, with verifiable provenance. Without that, even signed firmware and secure elements only solve part of the problem.

      This is not just about preventing worst-case exploits. It is about making Elixir a viable long-term foundation for security-sensitive, production-grade systems.
