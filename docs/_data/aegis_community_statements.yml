    text: Supply-chain security and trusted builds matter because modern software depends on many external components, making it vulnerable to hidden compromises. Ensuring build integrity and verifying dependencies protects users, maintains trust, and reduces systemic risk. For us, it’s essential to deliver reliable, tamper-free software and contribute to a safer overall ecosystem
  - author: Mayel de Borniol
    company:
    person: Mayel de Borniol
    projects:
      - https://bonfirenetworks.org
      - https://hex.pm/orgs/bonfire
    text: |-
      The Bonfire open source project strongly supports the Erlang Ecosystem Foundation’s Ægis initiative and its mission to strengthen the software supply chain across the BEAM ecosystem.

      Bonfire is built as a federated, community-driven platform that prioritises user autonomy, trust, safety, and resilience. These same values depend fundamentally on a secure and trustworthy software supply chain. As both maintainers and users of open source dependencies, we recognise that even small weaknesses in package infrastructure, publishing workflows, or dependency integrity can have ecosystem-wide consequences.

      The goals of Ægis, particularly around verifiable build provenance, secure publishing, vulnerability management, and transparency, directly align with the needs of projects like Bonfire. In decentralised and federated systems, trust must be established through verifiable mechanisms rather than assumptions. Efforts such as SBOM generation, improved authentication, and transparent audit trails are critical to making that possible.

      We are especially supportive of the initiative’s focus on democratising advanced security practices. Many community-led projects operate without dedicated security teams, yet need to meet increasingly high standards for compliance and risk management. Providing accessible, well-integrated tooling and clear best practices will enable projects like ours to adopt stronger security postures without compromising sustainability.

      Bonfire is committed to adopting the practices and tooling that emerge from this work, and to participating in the broader community effort to refine and maintain them. We believe that long-term success will come from widespread adoption, shared responsibility, and continued collaboration across the ecosystem.

      Strengthening the supply chain is not a one-time effort but an ongoing commitment. We view Ægis as a crucial step toward ensuring the long-term health, security, and trustworthiness of the BEAM ecosystem.
