    text: |
      We rely on RabbitMQ, built on Erlang, as a core component in systems used within critical infrastructure. In such environments, reliability and security are essential—any compromise in the software supply chain can directly impact operations.

      Trusted builds, reproducibility, and verifiable dependencies are therefore fundamental requirements. Strengthening supply-chain security ensures that the systems we depend on remain resilient, auditable, and safe to operate over long lifecycles.

      Supporting Ægis aligns with our need for high-assurance software foundations in critical infrastructure.
