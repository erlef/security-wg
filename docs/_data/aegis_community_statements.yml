    company:
    person: thanos vassilakis
    projects: []
    text: |-
      As a maintainer of 12 packages on Hex—including critical infrastructure like ex_zarr (a pure Elixir Zarr implementation used for scientific data pipelines), ex_utcp (a foundational protocol for tool communication), and ExBags (a core data structure library)—I rely on the integrity of the Erlang/Elixir supply chain daily. Supply-chain security and trusted builds are non-negotiable for my projects and users.

      My work supports domains where trust is paramount: ex_zarr handles sensitive scientific datasets (e.g., climate research, genomics), where a compromised build could corrupt irreplaceable data or leak intellectual property. Similarly, ex_utcp’s role in tool interoperability means any vulnerability could cascade across developer workflows. Without verifiable, tamper-proof builds and transparent provenance (core Ægis goals), I cannot guarantee the safety of my users’ systems—or my own reputation as a steward of open-source infrastructure.

      This grant directly addresses my greatest operational risk: the fragility of trust in open-source toolchains. As a maintainer of 12 packages, I spend significant effort auditing dependencies and mitigating supply-chain threats—effort that could be redirected toward innovation if Ægis’ tooling (e.g., reproducible builds, SBOMs, and hardened publishing) were natively supported by Hex. Adopting these standards isn’t optional; it’s essential for the sustainability of my projects and the ecosystem I depend on.

      I fully commit to adopting Ægis’ forthcoming practices and tooling, and I will actively contribute to their refinement. This grant isn’t just about security—it’s about enabling open-source maintainers like me to build with confidence, so we can focus on advancing Elixir’s potential rather than defending against preventable threats. The future of our ecosystem depends on it.
  - author: thanos vassilakis
    company:
    person: thanos vassilakis
    projects:
      - https://hex.pm/packages/ex_utcp
    text: |
      As the maintainer of ex_utcp — a foundational implementation of the Universal Tool Calling Protocol (UTCP) in Elixir — I rely on the integrity of the Hex ecosystem to deliver trustworthy, tamper-proof toolchain infrastructure. UTCP is not just another library; it is the communication backbone for developer tools, enabling secure interoperability between IDEs, CLIs, and automation systems. A single compromised build of ex_utcp could silently hijack toolchains across the entire ecosystem.

      This is why supply-chain security and trusted builds are existential for ex_utcp and its users:

      Critical Attack Surface: UTCP handles real-time tool-to-tool communication. If malicious code infiltrates ex_utcp (e.g., via a compromised dependency or build), attackers could intercept sensitive developer inputs, exfiltrate credentials, or manipulate tool outputs — without users ever knowing.
      Zero Tolerance for Risk: As a protocol implementation, ex_utcp is embedded in workflows where trust is non-negotiable (e.g., CI/CD pipelines, security tooling). A single breach could cascade across all dependent tools, making supply-chain security a core requirement — not an afterthought.
      My Responsibility as a Maintainer: I publish ex_utcp to Hex for 10,000+ monthly downloads. Without Ægis’ guarantees (reproducible builds, SBOMs, and verified provenance), I cannot confidently vouch for the integrity of every binary my users deploy. This undermines the trust my project depends on.
      The Ægis grant directly addresses my highest-priority challenge: ensuring ex_utcp’s supply chain is auditable, immutable, and resistant to sophisticated attacks. With this funding, the EEF can harden Hex against threats that would otherwise leave projects like ex_utcp — and the tools that rely on it — catastrophically vulnerable. I will immediately adopt all Ægis tooling (e.g., signed builds, dependency transparency) and contribute to its refinement to protect this critical infrastructure.

      For the ecosystem to thrive, we must treat protocols like UTCP as security infrastructure, not just code. This grant is the shield that allows maintainers like me to focus on innovation — not firefighting supply-chain breaches.
