  - author: Andew Dryga
    company:
    person: Andew Dryga
    projects: []
    text: In the age where we have cyberwars, massive supply chain attacks, and LLMs that can break out of sandboxes, we also need to have consistent countermeasures to all of this.
  - author: Andrew France
    company:
    person: Andrew France
    projects: []
    text: As a software developer with experience across several languages, supply-chain attacks are one of the threats that concern me the most as they are where we currently have the fewest defences given the potential severity of the danger. Individual projects can prevent and ward off direct attacks but few things can compromise more projects faster than a malicious dependency. Unlike some other ecosystems where massive dependency trees are the norm, Elixir and Erlang are in an excellent position to introduce more trust in the build and packaging processes. The robustness of the BEAM platform already brings benefits for many types of workload. Being able to demonstrate an industry-leading enhanced security story would extend the range of applications for BEAM languages in multiple sectors such as government and infrastructure.
